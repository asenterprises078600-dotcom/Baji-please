<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baji Please! ❤️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #ffe6f2;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Floating Hearts Animation */
        .hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: -1;
        }
        .hearts li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px; background: rgba(255, 105, 180, 0.3);
            animation: animateHearts 25s linear infinite; bottom: -150px;
            border-radius: 50%; transform: rotate(-45deg);
        }
        .hearts li::before, .hearts li::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 50%;
        }
        .hearts li::before { top: -50%; left: 0; }
        .hearts li::after { top: 0; left: 50%; }

        @keyframes animateHearts {
            0% { transform: translateY(0) rotate(-45deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(144deg); opacity: 0; }
        }

        /* Card Styles */
        #main-card, #thank-you-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.3);
            width: 320px;
            border: 4px solid #ffb3d9;
            z-index: 10;
        }

        h1 { color: #d63384; font-size: 26px; margin-bottom: 30px; }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
            margin-top: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yes-btn {
            background-color: #ff69b4;
            color: white;
        }
        #yes-btn:hover {
            transform: scale(1.2);
            background-color: #ff1493;
        }

        #no-btn {
            background-color: #ffccd5;
            color: #d63384;
            position: absolute;
            z-index: 100;
            transition: all 0.1s ease-out;
        }

        #thank-you-card { display: none; }

        .qr-code {
            margin-top: 20px;
            width: 200px;
            height: 200px;
            border: 5px solid #ffb3d9;
            border-radius: 15px;
        }

        .upi-id {
            font-weight: bold; color: #d63384;
            display: block; margin-top: 15px;
            background: #ffe6f2; padding: 8px; border-radius: 10px;
        }

        /* -- CUSTOM CUTIE POPUP (MODAL) STYLES -- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Dim background */
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.5);
            border: 5px solid #ffb3d9;
            width: 300px;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-card {
            transform: scale(1);
        }

        /* Big Heart Icon inside modal */
        .modal-heart {
            font-size: 80px;
            color: #d63384;
            margin-bottom: 20px;
            display: block;
        }

        .modal-text {
            color: #333;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        #close-modal-btn {
            background-color: #d63384;
            color: white;
            font-size: 16px;
            padding: 10px 30px;
        }
        #close-modal-btn:hover {
            background-color: #b52a6e;
        }

    </style>
</head>
<body>

    <ul class="hearts">
        <li style="left: 25%; animation-delay: 0s;"></li>
        <li style="left: 10%; animation-delay: 2s;"></li>
        <li style="left: 70%; animation-delay: 4s;"></li>
        <li style="left: 40%; animation-delay: 0s;"></li>
        <li style="left: 85%; animation-delay: 1s;"></li>
    </ul>

    <div id="main-card">
        <h1>Baji 100 rupay dede ❤️</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="showThanks()">Yes</button>
            <button id="no-btn" onclick="showGaddariPopup()">No</button>
        </div>
    </div>

    <div id="thank-you-card">
        <h1>Baji is the Best! 🥰</h1>
        <p>Hurry up! Scan kari lo!</p>
        <span class="upi-id">9211698297@ybl</span>
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9211698297@ybl%26pn=Recipient%26am=100%26cu=INR" alt="QR Code">
        <p style="margin-top: 15px;">Chocolate khavi che mane! 🍫</p>
    </div>

    <div class="modal-overlay" id="gaddari-modal">
        <div class="modal-card">
            <span class="modal-heart">💖</span> <div class="modal-text">Gaddari karbe? 🤨</div>
            <button id="close-modal-btn" onclick="closePopup()">Pata chal gaya!</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const mainCard = document.getElementById('main-card');
        const thankYouCard = document.getElementById('thank-you-card');
        const gaddariModal = document.getElementById('gaddari-modal');

        // Function to move "No" button (at 0.40s speed)
        function moveNoButton() {
            const padding = 20;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2) + padding;
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.position = 'fixed';
        }

        setInterval(moveNoButton, 400);

        function showThanks() {
            mainCard.style.display = 'none';
            thankYouCard.style.display = 'block';
            noBtn.style.display = 'none'; // Yes hone par button hide
        }

        // --- New Custom Popup Logic ---
        function showGaddariPopup() {
            gaddariModal.classList.add('show');
        }

        function closePopup() {
            gaddariModal.classList.remove('show');
        }
    </script>
</body>
</html>
